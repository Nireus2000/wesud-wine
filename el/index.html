<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WeSud">
<meta name="theme-color" content="#5B3A4A">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>WeSud — Συνδυασμός Κρασιών</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --wine: #5B3A4A;
  --wine-light: #7D5A6A;
  --wine-dark: #3D2433;
  --sage: #7A8B6F;
  --sage-light: #A3B396;
  --gold: #C4A265;
  --gold-light: #E8D5AD;
  --cream: #FAF8F5;
  --warm-white: #FFFFFF;
  --charcoal: #2C2C2C;
  --text-secondary: #6B6B6B;
  --divider: #E8E4E0;
  --shadow: rgba(91, 58, 74, 0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--cream);
  color: var(--charcoal);
  height: 100%;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* SPLASH SCREEN */
#splash {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--wine-dark);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.8s ease, visibility 0.8s ease;
}
#splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
#splash .compass {
  width: 100px; height: 100px;
  border: 2px solid var(--gold);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  margin-bottom: 32px;
  animation: fadeInUp 1s ease;
}
#splash .compass-letters {
  font-family: 'Cormorant Garamond', 'EB Garamond', serif;
  font-weight: 600; font-size: 18px; color: var(--gold);
  position: absolute;
}
#splash .compass-letters.n { top: 8px; }
#splash .compass-letters.s { bottom: 6px; }
#splash .compass-letters.w { left: 10px; }
#splash .compass-letters.e { right: 10px; }
#splash .compass-dot { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; }
#splash h1 {
  font-family: 'Cormorant Garamond', 'EB Garamond', serif;
  font-weight: 300; font-size: 20px; color: var(--gold-light);
  letter-spacing: 6px; text-transform: uppercase;
  animation: fadeInUp 1s ease 0.3s both;
}
#splash .tagline {
  font-size: 13px; color: var(--wine-light); margin-top: 12px;
  letter-spacing: 2px; font-weight: 300;
  animation: fadeInUp 1s ease 0.6s both;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* APP LAYOUT */
#app {
  height: 100%; display: flex; flex-direction: column;
  opacity: 0; transition: opacity 0.6s ease 0.3s;
}
#app.visible { opacity: 1; }

/* HEADER */
header {
  background: var(--warm-white);
  padding: 16px 28px 12px;
  border-bottom: 1px solid var(--divider);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
header .logo {
  font-family: 'Cormorant Garamond', 'EB Garamond', serif;
  font-weight: 500; font-size: 22px; color: var(--wine);
  letter-spacing: 3px;
}
header .subtitle {
  font-size: 11px; color: var(--text-secondary);
  letter-spacing: 2px; text-transform: uppercase; font-weight: 400;
}
header .award {
  font-size: 10px; color: var(--gold);
  letter-spacing: 1px; font-weight: 500;
}

/* MODE TOGGLE */
.mode-toggle {
  display: flex;
  background: rgba(91,58,74,0.06);
  border-radius: 20px;
  padding: 3px;
}
.mode-btn {
  padding: 6px 16px;
  border-radius: 17px;
  font-size: 11px; font-weight: 500;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.3s ease;
  white-space: nowrap;
  border: none; background: none;
  font-family: inherit;
}
.mode-btn.active {
  background: var(--wine);
  color: white;
  box-shadow: 0 2px 8px rgba(91,58,74,0.25);
}

/* WINE EXPLORER ITEMS */
.wine-list-item {
  padding: 14px 24px;
  cursor: pointer;
  transition: background 0.2s ease;
  border-bottom: 1px solid rgba(0,0,0,0.03);
}
.wine-list-item:active { background: rgba(91,58,74,0.04); }
.wine-list-item.selected { background: rgba(91,58,74,0.06); border-left: 3px solid var(--wine); }
.wine-list-item .wl-name {
  font-family: 'Cormorant Garamond', 'EB Garamond', serif;
  font-size: 16px; font-weight: 500; color: var(--charcoal);
  line-height: 1.3; margin-bottom: 2px;
}
.wine-list-item .wl-meta {
  font-size: 11px; color: var(--text-secondary); font-weight: 300;
}
.wine-list-item .wl-bottom {
  display: flex; align-items: center; justify-content: space-between; margin-top: 6px;
}
.wine-list-item .wl-price {
  font-size: 13px; color: var(--wine); font-weight: 500;
}
.wine-list-item .wl-type {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 9px; letter-spacing: 0.3px;
  font-weight: 500;
}

/* WINE DETAIL CARD */
.wine-detail { padding: 28px 32px; }
.wine-detail .wd-region-label {
  font-size: 11px; color: var(--text-secondary);
  letter-spacing: 2px; text-transform: uppercase;
  font-weight: 400; margin-bottom: 4px;
}
.wine-detail .wd-name {
  font-family: 'Cormorant Garamond', 'EB Garamond', serif;
  font-size: 28px; font-weight: 500; color: var(--charcoal);
  line-height: 1.25; margin-bottom: 8px;
}
.wine-detail .wd-meta-row {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  margin-bottom: 16px;
}
.wine-detail .wd-meta-item {
  font-size: 12px; color: var(--text-secondary); font-weight: 300;
}
.wine-detail .wd-price-row {
  display: flex; align-items: baseline; gap: 8px;
  margin-bottom: 24px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--divider);
}
.wine-detail .wd-price {
  font-size: 28px; font-weight: 500; color: var(--wine);
}
.wine-detail .wd-format {
  font-size: 13px; color: var(--text-secondary); font-weight: 300;
}

.tasting-section {
  margin-bottom: 24px;
}
.tasting-section .ts-label {
  font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  font-weight: 500; color: var(--wine); margin-bottom: 10px;
}
.tasting-section p {
  font-size: 13px; line-height: 1.7; color: var(--charcoal); font-weight: 300;
}
.tasting-section .highlight { color: var(--wine); font-weight: 500; }

.tasting-notes-grid {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 12px; margin-bottom: 24px;
}
.tn-card {
  background: rgba(91,58,74,0.03);
  border-radius: 10px;
  padding: 12px 14px;
  text-align: center;
}
.tn-card .tn-icon { margin-bottom: 6px; color: var(--wine-light); display: flex; justify-content: center; }
.tn-card .tn-label {
  font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
  color: var(--text-secondary); font-weight: 500; margin-bottom: 3px;
}
.tn-card .tn-value {
  font-size: 12px; color: var(--charcoal); font-weight: 400;
}

/* PAIRS WELL WITH */
.pairs-well {
  background: linear-gradient(135deg, rgba(122,139,111,0.05), rgba(196,162,101,0.05));
  border-radius: 12px;
  padding: 20px 24px;
  border-left: 3px solid var(--sage);
}
.pairs-well .pw-label {
  font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--sage); font-weight: 500; margin-bottom: 12px;
}
.pairs-well .pw-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(0,0,0,0.04);
}
.pairs-well .pw-item:last-child { border-bottom: none; }
.pairs-well .pw-dish {
  font-family: 'Cormorant Garamond', 'EB Garamond', serif;
  font-size: 16px; font-weight: 500; color: var(--charcoal);
  flex: 1;
}
.pairs-well .pw-why {
  font-size: 11px; color: var(--text-secondary); font-weight: 300;
  flex: 2;
}
.pairs-well .pw-price {
  font-size: 12px; color: var(--wine); font-weight: 500;
  white-space: nowrap;
}

/* VIVINO RATING */
.vivino-card {
  background: var(--warm-white);
  border-radius: 14px;
  padding: 20px 24px;
  margin-bottom: 24px;
  box-shadow: 0 1px 12px var(--shadow);
  border: 1px solid rgba(0,0,0,0.04);
  display: flex;
  align-items: center;
  gap: 20px;
}
.vivino-logo {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  flex-shrink: 0;
}
.vivino-logo svg { width: 24px; height: 24px; }
.vivino-logo .vl-text {
  font-size: 9px; letter-spacing: 0.5px; color: #A61D37; font-weight: 600;
  text-transform: uppercase;
}
.vivino-score {
  display: flex; align-items: baseline; gap: 4px;
}
.vivino-score .vs-number {
  font-family: 'Cormorant Garamond', 'EB Garamond', serif;
  font-size: 36px; font-weight: 600; color: var(--charcoal);
  line-height: 1;
}
.vivino-score .vs-max {
  font-size: 14px; color: var(--text-secondary); font-weight: 300;
}
.vivino-stars {
  display: flex; gap: 2px; margin-top: 4px;
}
.vivino-stars .star {
  width: 16px; height: 16px; position: relative;
}
.vivino-stars .star svg { width: 16px; height: 16px; }
.vivino-stars .star-filled { color: #A61D37; }
.vivino-stars .star-half { color: #A61D37; }
.vivino-stars .star-empty { color: #DDD; }
.vivino-info {
  flex: 1;
}
.vivino-info .vi-ratings {
  font-size: 12px; color: var(--text-secondary); font-weight: 300;
  margin-top: 2px;
}
.vivino-info .vi-label {
  font-size: 10px; color: var(--text-secondary); letter-spacing: 1px;
  text-transform: uppercase; font-weight: 400; margin-bottom: 2px;
}
.vivino-bar-track {
  height: 4px; background: #EEE; border-radius: 2px; margin-top: 8px;
  overflow: hidden; width: 100%;
}
.vivino-bar-fill {
  height: 100%; background: linear-gradient(90deg, #A61D37, #D4446A);
  border-radius: 2px;
  transition: width 0.8s ease;
}

/* MAIN CONTENT */
main {
  flex: 1; display: flex; overflow: hidden;
}

/* LEFT PANEL - MENU */
.menu-panel {
  width: 45%; border-right: 1px solid var(--divider);
  display: flex; flex-direction: column;
  background: var(--warm-white);
}

.category-tabs {
  display: flex; padding: 0; border-bottom: 1px solid var(--divider);
  overflow-x: auto; flex-shrink: 0;
  scrollbar-width: none;
}
.category-tabs::-webkit-scrollbar { display: none; }
.cat-tab {
  padding: 14px 18px;
  font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-secondary); font-weight: 500;
  white-space: nowrap; cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.3s ease;
  flex-shrink: 0;
}
.cat-tab.active {
  color: var(--wine); border-bottom-color: var(--wine);
}

.price-filter {
  padding: 12px 20px 14px;
  border-bottom: 1px solid var(--divider);
  background: var(--warm-white);
  flex-shrink: 0;
}
.price-filter-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.pf-label {
  font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-secondary); font-weight: 600;
}
.pf-readout {
  font-family: 'Cormorant Garamond', 'EB Garamond', serif;
  font-size: 15px; color: var(--wine); font-weight: 600;
  letter-spacing: 0.3px;
}
.pf-readout .pf-sep { color: var(--text-secondary); margin: 0 6px; font-weight: 400; }
.pf-reset {
  background: none; border: none; cursor: pointer;
  font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
  color: var(--gold); font-weight: 600; padding: 2px 0;
  transition: opacity 0.2s;
}
.pf-reset:hover { opacity: 0.7; }
.pf-reset:disabled { color: var(--text-secondary); opacity: 0.4; cursor: default; }

.price-slider-wrap {
  position: relative; height: 22px;
}
.price-slider-track {
  position: absolute; top: 50%; left: 0; right: 0; height: 3px;
  transform: translateY(-50%);
  background: var(--divider); border-radius: 2px;
}
.price-slider-range {
  position: absolute; top: 50%; height: 3px;
  transform: translateY(-50%);
  background: var(--wine); border-radius: 2px;
}
.price-slider-wrap input[type=range] {
  position: absolute; top: 0; left: 0; width: 100%; height: 22px;
  -webkit-appearance: none; appearance: none;
  background: transparent; pointer-events: none;
  margin: 0; padding: 0;
}
.price-slider-wrap input[type=range]::-webkit-slider-runnable-track {
  background: transparent; height: 22px; border: none;
}
.price-slider-wrap input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 22px; height: 22px; border-radius: 50%;
  background: #fff; border: 2px solid var(--wine);
  box-shadow: 0 2px 6px rgba(91,58,74,0.25);
  cursor: pointer; pointer-events: auto;
  margin-top: 0;
}
.price-slider-wrap input[type=range]::-moz-range-track {
  background: transparent; height: 22px; border: none;
}
.price-slider-wrap input[type=range]::-moz-range-thumb {
  width: 22px; height: 22px; border-radius: 50%;
  background: #fff; border: 2px solid var(--wine);
  box-shadow: 0 2px 6px rgba(91,58,74,0.25);
  cursor: pointer; pointer-events: auto;
  box-sizing: border-box;
}
.pf-count {
  margin-top: 6px; font-size: 10px; letter-spacing: 0.5px;
  color: var(--text-secondary); text-align: right;
  font-style: italic;
}

.menu-list {
  flex: 1; overflow-y: auto; padding: 8px 0;
  -webkit-overflow-scrolling: touch;
}
.menu-list::-webkit-scrollbar { width: 3px; }
.menu-list::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 3px; }

.menu-item {
  padding: 16px 24px;
  cursor: pointer;
  transition: background 0.2s ease;
  border-bottom: 1px solid rgba(0,0,0,0.03);
}
.menu-item:active { background: rgba(91,58,74,0.04); }
.menu-item.selected { background: rgba(91,58,74,0.06); border-left: 3px solid var(--wine); }
.menu-item .dish-name {
  font-family: 'Cormorant Garamond', 'EB Garamond', serif;
  font-size: 18px; font-weight: 500; color: var(--charcoal);
  margin-bottom: 4px;
}
.menu-item .dish-desc {
  font-size: 12px; color: var(--text-secondary); line-height: 1.5;
  font-weight: 300;
}
.menu-item .dish-price {
  font-size: 13px; color: var(--wine); font-weight: 500;
  margin-top: 6px;
}

/* RIGHT PANEL - PAIRING */
.pairing-panel {
  width: 55%; display: flex; flex-direction: column;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.pairing-panel::-webkit-scrollbar { width: 3px; }
.pairing-panel::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 3px; }

.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px;
}
.empty-state .glass-icon {
  width: 64px; height: 64px; margin-bottom: 24px;
  opacity: 0.15;
}
.empty-state h2 {
  font-family: 'Cormorant Garamond', 'EB Garamond', serif;
  font-weight: 400; font-size: 24px; color: var(--wine-light);
  margin-bottom: 8px;
}
.empty-state p {
  font-size: 13px; color: var(--text-secondary); font-weight: 300;
  text-align: center; line-height: 1.6;
}

/* PAIRING CARD */
.pairing-section {
  padding: 28px 32px;
}
.pairing-for {
  font-size: 11px; color: var(--text-secondary);
  letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 4px; font-weight: 400;
}
.pairing-dish-name {
  font-family: 'Cormorant Garamond', 'EB Garamond', serif;
  font-size: 26px; font-weight: 500; color: var(--charcoal);
  margin-bottom: 24px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--divider);
}

.wine-card {
  background: var(--warm-white);
  border-radius: 16px;
  padding: 28px;
  margin-bottom: 20px;
  box-shadow: 0 2px 20px var(--shadow);
  border: 1px solid rgba(0,0,0,0.04);
  position: relative;
  overflow: hidden;
}
.wine-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
}
.wine-card.primary::before { background: var(--wine); }
.wine-card.secondary::before { background: var(--sage); }

.wine-card .badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 10px; letter-spacing: 1.5px;
  text-transform: uppercase; font-weight: 500;
  margin-bottom: 16px;
}
.wine-card.primary .badge {
  background: rgba(91,58,74,0.08); color: var(--wine);
}
.wine-card.secondary .badge {
  background: rgba(122,139,111,0.1); color: var(--sage);
}

.wine-card .wine-name {
  font-family: 'Cormorant Garamond', 'EB Garamond', serif;
  font-size: 22px; font-weight: 600; color: var(--charcoal);
  line-height: 1.3; margin-bottom: 6px;
}
.wine-card .wine-meta {
  font-size: 12px; color: var(--text-secondary); font-weight: 300;
  margin-bottom: 4px;
}
.wine-card .wine-price {
  font-size: 18px; font-weight: 500; color: var(--wine);
  margin-top: 12px; margin-bottom: 16px;
}
.wine-card .wine-price span {
  font-size: 12px; color: var(--text-secondary); font-weight: 300;
  margin-left: 4px;
}

.wine-card .rationale {
  padding: 16px 0 0;
  border-top: 1px solid var(--divider);
}
.wine-card .rationale-label {
  font-size: 10px; letter-spacing: 1.5px;
  text-transform: uppercase; font-weight: 500;
  margin-bottom: 8px;
}
.wine-card.primary .rationale-label { color: var(--wine); }
.wine-card.secondary .rationale-label { color: var(--sage); }

.wine-card .rationale p {
  font-size: 13px; line-height: 1.7; color: var(--charcoal);
  font-weight: 300;
}
.wine-card .rationale .highlight {
  color: var(--wine); font-weight: 500;
}

.wine-type-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 10px; letter-spacing: 0.5px;
  font-weight: 500; margin-top: 8px;
}
.type-white { background: #F5F0E0; color: #8B7A3A; }
.type-red { background: #F0E0E5; color: #8B3A4A; }
.type-rose { background: #F5E8EB; color: #B06070; }
.type-sparkling { background: #E8EFF5; color: #4A6A8B; }
.type-sweet { background: #F5EDE0; color: #8B6A3A; }

/* COST-CONSCIOUS DROPDOWN */
.budget-toggle {
  margin-bottom: 20px;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--divider);
  transition: box-shadow 0.3s ease;
}
.budget-toggle.open {
  box-shadow: 0 2px 16px var(--shadow);
}
.budget-toggle-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 22px;
  cursor: pointer;
  background: linear-gradient(135deg, #FAFAF7, #F5F3EE);
  transition: background 0.2s ease;
  user-select: none;
  -webkit-user-select: none;
}
.budget-toggle-header:active { background: #F0EDE7; }
.budget-toggle-header .bt-left {
  display: flex; align-items: center; gap: 10px;
}
.budget-toggle-header .bt-icon {
  width: 28px; height: 28px;
  background: rgba(122,139,111,0.1);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--sage);
  flex-shrink: 0;
}
.budget-toggle-header .bt-icon svg { display: block; }
.budget-toggle-header .bt-label {
  font-size: 12px; font-weight: 500; color: var(--charcoal);
  letter-spacing: 0.5px;
}
.budget-toggle-header .bt-hint {
  font-size: 11px; color: var(--text-secondary); font-weight: 300;
}
.budget-toggle-header .bt-arrow {
  font-size: 14px; color: var(--text-secondary);
  transition: transform 0.3s ease;
}
.budget-toggle.open .bt-arrow { transform: rotate(180deg); }

.budget-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
  background: var(--warm-white);
}
.budget-toggle.open .budget-body {
  max-height: 500px;
}
.budget-body-inner {
  padding: 0 22px 22px;
}
.budget-wine-name {
  font-family: 'Cormorant Garamond', 'EB Garamond', serif;
  font-size: 19px; font-weight: 600; color: var(--charcoal);
  line-height: 1.3; margin-bottom: 4px; margin-top: 16px;

function scoreComboPairing(wine, selectedIds) {
  let score = 0;
  const allTags = new Set();
  selectedIds.forEach(id => { (dishTags[id] || []).forEach(t => allTags.add(t)); });
  allTags.forEach(tag => { if (wine.tags.includes(tag)) score += 1; });
  // Bonus: if the wine covers tags from ALL dishes (not just some)
  let dishCoverage = 0;
  selectedIds.forEach(id => {
    const tags = dishTags[id] || [];
    if (tags.some(t => wine.tags.includes(t))) dishCoverage++;
  });
  // Strong bonus for covering every selected dish
  if (dishCoverage === selectedIds.length) score += 5;
  // Prefer upscale
  if (wine.price >= 100) score += 1;
  if (wine.price >= 150) score += 1;
  return score;
}

}

// _allExplorerWines built after wineList is defined (see below)
let _allExplorerWines = [];

function _norm(s) { return s.toLowerCase().replace(/[^a-z0-9]/g, ''); }

function findWineDetail(w) {
  if (!w || !w.name) return null;
  const wn = _norm(w.name);
  // 1. Exact normalised name match
  let match = _allExplorerWines.find(e => _norm(e.name) === wn);
  if (match) return match;
  // 2. Key-word overlap scoring
  const stop = new Set(['the','with','del','des','de','du','der','las','les','los','doc','docg','pdo','pgi','cru','aoc','igt','and','cotes','chateau','domaine','estate','winery','varietal','wine','reserve','gran','reserva','brut','blanc','rouge','rose','bottle','vieilles','vignes']);
  const words = s => s.toLowerCase().replace(/[^a-z0-9\s]/g,'').split(/\s+/).filter(x => x.length >= 3 && !stop.has(x));
  const pw = words(w.name);
  if (!pw.length) return null;
  let best = 0, hit = null;
  for (const e of _allExplorerWines) {
    if (e.type !== w.type) continue;
    const ew = words(e.name);
    let sc = 0;
    for (const p of pw) for (const q of ew) {
      if (p === q) sc += 3;
      else if (p.length > 3 && q.length > 3 && (p.includes(q) || q.includes(p))) sc += 2;
    }
    if (e.price === w.price) sc += 2;
    if (sc > best) { best = sc; hit = e; }
  }
  return best >= 4 ? hit : null;
}

// Build a wine object compatible with renderBudgetDropdown from an explorer entry.
// Adds a lightweight rationale so the "Why this wine" box isn't empty.
function _asLadderWine(w, whyText) {
  if (!w) return null;
  return {
    name: w.name, grape: w.grape, region: w.region, vintage: w.vintage,
    price: w.price, format: w.format, type: w.type,
    rationale: whyText,
    desc: w.desc
  };
}

// Pick a mid-tier "Value for Money" bottle: matching type, priced below the
// primary but above the cheapest tier. Returns 2nd or 3rd cheapest bottle of
// matching type, excluding the other ladder wines by name.
function deriveValueWine(primary, excludeNames) {
  if (!primary) return null;
  const excl = new Set(excludeNames.filter(Boolean).map(n => n.toLowerCase()));
  const candidates = [];
  for (const [cat, wines] of Object.entries(wineList)) {
    if (cat === 'By the Glass') continue;
    for (const w of wines) {
      if (!w || w.type !== primary.type) continue;
      if (excl.has((w.name || '').toLowerCase())) continue;
      const p = Number(w.price);
      if (!Number.isFinite(p) || p <= 0) continue;
      candidates.push(w);
    }
  }
  if (!candidates.length) return null;
  candidates.sort((a, b) => Number(a.price) - Number(b.price));
  // Pick 2nd cheapest if available, else 3rd, else 1st
  const pick = candidates[1] || candidates[2] || candidates[0];
  const why = `Ένα λογικά τιμολογημένο <span class="highlight">${pick.grape}</span> από ${pick.region} που τιμά το ίδιο ύφος με την κορυφαία μας πρόταση. Στα &euro; ${pick.price}, δίνει τον χαρακτήρα του συνδυασμού χωρίς τυμπανοκρουσίες.`;
  return _asLadderWine(pick, why);
}

// Pick a By-the-Glass pour matching the primary's type
function deriveGlassPour(primary, excludeNames) {
  if (!primary) return null;
  const glasses = wineList['By the Glass'] || [];
  if (!glasses.length) return null;
  const excl = new Set(excludeNames.filter(Boolean).map(n => n.toLowerCase()));
  const sameType = glasses.filter(w => w.type === primary.type && !excl.has((w.name || '').toLowerCase()));
  const pick = sameType[0] || glasses.find(w => !excl.has((w.name || '').toLowerCase())) || glasses[0];
  if (!pick) return null;
  const why = `Ένα ποτήρι <span class="highlight">${pick.grape}</span> για όσους προτιμούν ένα μόνο σερβίρισμα. Κρατάει το πνεύμα του συνδυασμού χωρίς τη δέσμευση μιας φιάλης.`;
  return _asLadderWine(pick, why);
}

// Split the hand-curated budget entry by format into (costBottle, glassPour)
function _splitBudgetByFormat(b) {
  if (!b) return { costBottle: null, glassPour: null };
  const fmt = (b.format || '').toLowerCase();
  if (fmt.includes('glass')) return { costBottle: null, glassPour: b };
  return { costBottle: b, glassPour: null };
}

// Given a primary wine and the curated budget entry, produce the three lower
// tiers: Value for Money, Cost-Conscious, By the Glass.
function buildLadder(primary, secondary, curatedBudget) {
  const { costBottle: curatedCost, glassPour: curatedGlass } = _splitBudgetByFormat(curatedBudget);
  const excludeBase = [primary && primary.name, secondary && secondary.name, curatedBudget && curatedBudget.name];

  const costBottle = curatedCost || (function() {
    // Derive cheapest bottle of matching type, excluding the known ones
    const excl = new Set(excludeBase.filter(Boolean).map(n => n.toLowerCase()));
    let cheapest = null;
    for (const [cat, wines] of Object.entries(wineList)) {
      if (cat === 'By the Glass') continue;
      for (const w of wines) {
        if (!w || w.type !== primary.type) continue;
        if (excl.has((w.name || '').toLowerCase())) continue;
        const p = Number(w.price);
        if (!Number.isFinite(p) || p <= 0) continue;
        if (!cheapest || p < Number(cheapest.price)) cheapest = w;
      }
    }
    if (!cheapest) return null;
    const why = `Η πιο προσιτή φιάλη σε αυτό το ύφος — ένα <span class="highlight">${cheapest.grape}</span> από ${cheapest.region} στα &euro; ${cheapest.price}. Ειλικρινές, καλοφτιαγμένο και γενναιόδωρο στον συνδυασμό.`;
    return _asLadderWine(cheapest, why);
  })();

  const glassPour = curatedGlass || deriveGlassPour(primary, [...excludeBase, costBottle && costBottle.name]);
  const valueWine = deriveValueWine(primary, [...excludeBase, costBottle && costBottle.name, glassPour && glassPour.name]);

  return { valueWine, costBottle, glassPour };
}

function renderPairing() {
  const panel = document.getElementById('pairingPanel');
  const ids = [...selectedDishes];

  if (ids.length === 0) {
    panel.innerHTML = `<div class="empty-state" id="emptyState">
      <svg class="glass-icon" viewBox="0 0 64 64" fill="none">
        <path d="M22 8h20l-3 24c-.5 4-4 7-8 7h-1c-4 0-7.5-3-8-7L22 8z" stroke="#5B3A4A" stroke-width="1.5"/>
        <path d="M32 39v14" stroke="#5B3A4A" stroke-width="1.5"/>
        <path d="M24 53h16" stroke="#5B3A4A" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M22 18h20" stroke="#5B3A4A" stroke-width="1" opacity="0.3"/>
      </svg>
      <h2>Επιλέξτε τα Πιάτα σας</h2>
      <p>Διαλέξτε ένα ή περισσότερα πιάτα από το μενού<br>για να ανακαλύψετε τον ιδανικό συνδυασμό από την κάβα μας</p>
    </div>`;
    return;
  }

  // SINGLE DISH -- use original pairing
  if (ids.length === 1) {
    const id = ids[0];
    const pairing = pairings[id];
    if (!pairing) {
      panel.innerHTML = `<div class="empty-state"><h2>Πολύ σύντομα</h2><p>Ο sommelier μας ετοιμάζει τον ιδανικό συνδυασμό για αυτό το πιάτο.</p></div>`;
      return;
    }
    const dishName = findDishName(id);
    const p = pairing.primary;
    const s = pairing.secondary;
    const b = budgetWines[id];
    const { valueWine, costBottle, glassPour } = buildLadder(p, s, b);
    panel.innerHTML = `<div class="pairing-section fade-in">
      <div class="pairing-for">Προτεινόμενος συνδυασμός για</div>
      <div class="pairing-dish-name">${dishName}</div>
      ${renderWineCard(p, "Επιλογή Sommelier", "primary", 0.1)}
      ${renderWineCard(s, "Εναλλακτική", "secondary", 0.2)}
      ${renderBudgetDropdown(valueWine, 0.3, 'value')}
      ${renderBudgetDropdown(costBottle, 0.35, 'cost')}
      ${renderBudgetDropdown(glassPour, 0.4, 'glass')}
      ${pairing.note ? `<div class="sommelier-note fade-in" style="animation-delay: 0.5s">
        <div class="note-label">Σημείωση Sommelier</div>
        <p>${pairing.note}</p>
      </div>` : ''}
    </div>`;
    panel.scrollTop = 0;
    return;
  }

  // MULTI DISH -- check for hand-curated combo first, then use engine
  const comboKey = getComboKey(ids);
  const combo = comboPairings[comboKey];

  let primaryWine, secondaryWine, budgetWine, comboNote;

  if (combo) {
    primaryWine = combo.primary;
    secondaryWine = combo.secondary;
    budgetWine = combo.budget;
    comboNote = combo.note;
  } else {
    // Score all versatile wines
    const scored = versatileWines.map(w => ({ ...w, score: scoreComboPairing(w, ids) }));
    scored.sort((a, b) => b.score - a.score);
    // Pick top two of different types if possible
    const best = scored[0];
    let runner = scored[1];
    for (let i = 1; i < scored.length; i++) {
      if (scored[i].type !== best.type) { runner = scored[i]; break; }
    }
    primaryWine = { name: best.name, grape: best.grape, region: best.region, vintage: best.vintage, price: best.price, format: best.format, type: best.type, rationale: best.desc };
    secondaryWine = { name: runner.name, grape: runner.grape, region: runner.region, vintage: runner.vintage, price: runner.price, format: runner.format, type: runner.type, rationale: runner.desc };
    // Score budget wines
    const budgetScored = budgetVersatileWines.map(w => ({ ...w, score: scoreComboPairing(w, ids) }));
    budgetScored.sort((a, b) => b.score - a.score);
    const bestBudget = budgetScored[0];
    budgetWine = { name: bestBudget.name, grape: bestBudget.grape, region: bestBudget.region, vintage: bestBudget.vintage, price: bestBudget.price, format: bestBudget.format, type: bestBudget.type, rationale: bestBudget.desc };
    // Generate a contextual note
    const dishNames = ids.map(findDishName);
    const hasSeafood = ids.some(id => (dishTags[id] || []).some(t => ["seafood","fish","raw_fish","shrimp","scallop","tuna"].includes(t)));
    const hasMeat = ids.some(id => (dishTags[id] || []).some(t => ["beef","lamb","pork","steak","braised"].includes(t)));
    if (hasSeafood && hasMeat) {
      comboNote = `Your selection of ${dishNames.join(', ')} spans both sea and land. The sommelier's challenge here is finding a wine with enough weight for the meat yet enough finesse for the seafood. The recommended bottles above have been chosen for their exceptional versatility across this range.`;
    } else if (hasSeafood) {
      comboNote = `With ${dishNames.join(' and ')}, you're leaning toward the sea. The wines above offer the freshness and mineral drive to complement your seafood-focused selection while adapting to each dish's unique character.`;
    } else if (hasMeat) {
      comboNote = `${dishNames.join(', ')} -- a table of substance. The wines above bring the depth and structure to match your hearty selections, with enough complexity to remain captivating across each course.`;
    } else {
      comboNote = `For ${dishNames.join(', ')}, the wines above have been selected for their remarkable ability to bridge different flavors and textures throughout your meal.`;
    }
  }

  const dishTags2 = ids.map(id => `<span class="multi-dish-tag">${findDishName(id)}</span>`);

  const mLadder = buildLadder(primaryWine, secondaryWine, budgetWine);
  panel.innerHTML = `<div class="pairing-section fade-in">
    <div class="pairing-for">Προτεινόμενος συνδυασμός για την επιλογή σας</div>
    <div class="multi-dishes">${dishTags2.join('<span class="multi-dish-tag"><span class="plus">&</span></span>')}</div>
    ${renderWineCard(primaryWine, "Επιλογή Sommelier", "primary", 0.1)}
    ${renderWineCard(secondaryWine, "Εναλλακτική", "secondary", 0.2)}
    ${renderBudgetDropdown(mLadder.valueWine, 0.3, 'value')}
    ${renderBudgetDropdown(mLadder.costBottle, 0.35, 'cost')}
    ${renderBudgetDropdown(mLadder.glassPour, 0.4, 'glass')}
    <div class="sommelier-note fade-in" style="animation-delay: 0.5s">
      <div class="note-label">Στρατηγική Πολλαπλών Πιάτων</div>
      <p>${comboNote}</p>
    </div>
  </div>`;
  panel.scrollTop = 0;
}

let wineActiveCategory = Object.keys(wineList)[0];
let selectedWineId = null;

// Price filter state — bounds computed per active category
function getCategoryPriceBounds(cat) {
  const wines = wineList[cat] || [];
  const prices = wines.map(w => Number(w.price)).filter(p => Number.isFinite(p) && p > 0);
  if (!prices.length) return { min: 0, max: 500 };
  return { min: Math.floor(Math.min(...prices)), max: Math.ceil(Math.max(...prices)) };
}
let priceBounds = getCategoryPriceBounds(wineActiveCategory);
let priceFilter = { min: priceBounds.min, max: priceBounds.max };

function renderWineExplorerTabs() {
  const tabs = document.getElementById('tabs');
  const cats = Object.keys(wineList);
  tabs.innerHTML = cats.map(cat =>
    `<div class="cat-tab ${cat === wineActiveCategory ? 'active' : ''}" onclick="selectWineCategory('${cat}')">${cat}</div>`
  ).join('');
}

function selectWineCategory(cat) {
  wineActiveCategory = cat;
  priceBounds = getCategoryPriceBounds(cat);
  priceFilter = { min: priceBounds.min, max: priceBounds.max };
  renderWineExplorerTabs();
  renderPriceFilter();
  renderWineList();
}

function renderPriceFilter() {
  const el = document.getElementById('priceFilter');
  if (!el) return;
  if (currentMode !== 'explore') { el.innerHTML = ''; return; }
  // Guard: if bounds collapse (single-price category), hide the slider
  if (priceBounds.max <= priceBounds.min) { el.innerHTML = ''; return; }
  const isDefault = priceFilter.min === priceBounds.min && priceFilter.max === priceBounds.max;
  el.innerHTML = `
    <div class="price-filter">
      <div class="price-filter-header">
        <span class="pf-label">Εύρος Τιμής</span>
        <span class="pf-readout">&euro;${priceFilter.min} <span class="pf-sep">&mdash;</span> &euro;${priceFilter.max}</span>
        <button class="pf-reset" onclick="resetPriceFilter()" ${isDefault ? 'disabled' : ''}>Επαναφορά</button>
      </div>
      <div class="price-slider-wrap">
        <div class="price-slider-track"></div>
        <div class="price-slider-range" id="pfRange"></div>
        <input type="range" id="pfMin" min="${priceBounds.min}" max="${priceBounds.max}" step="1" value="${priceFilter.min}" oninput="onPriceSlide('min', this.value)">
        <input type="range" id="pfMax" min="${priceBounds.min}" max="${priceBounds.max}" step="1" value="${priceFilter.max}" oninput="onPriceSlide('max', this.value)">
      </div>
      <div class="pf-count" id="pfCount"></div>
    </div>`;
  updatePriceRangeBar();
}

function updatePriceRangeBar() {
  const bar = document.getElementById('pfRange');
  if (!bar) return;
  const span = priceBounds.max - priceBounds.min || 1;
  const leftPct = ((priceFilter.min - priceBounds.min) / span) * 100;
  const rightPct = ((priceFilter.max - priceBounds.min) / span) * 100;
  bar.style.left = leftPct + '%';
  bar.style.right = (100 - rightPct) + '%';
}

function onPriceSlide(which, val) {
  const v = parseInt(val, 10);
  if (which === 'min') {
    priceFilter.min = Math.min(v, priceFilter.max - 1);
    const inp = document.getElementById('pfMin');
    if (inp && parseInt(inp.value,10) !== priceFilter.min) inp.value = priceFilter.min;
  } else {
    priceFilter.max = Math.max(v, priceFilter.min + 1);
    const inp = document.getElementById('pfMax');
    if (inp && parseInt(inp.value,10) !== priceFilter.max) inp.value = priceFilter.max;
  }
  // Update readout + range bar without full re-render (preserves thumb focus)
  const readout = document.querySelector('#priceFilter .pf-readout');
  if (readout) {
    readout.innerHTML = `&euro;${priceFilter.min} <span class="pf-sep">&mdash;</span> &euro;${priceFilter.max}`;
  }
  const resetBtn = document.querySelector('#priceFilter .pf-reset');
  if (resetBtn) resetBtn.disabled = (priceFilter.min === priceBounds.min && priceFilter.max === priceBounds.max);
  updatePriceRangeBar();
  renderWineList();
}

function resetPriceFilter() {
  priceFilter = { min: priceBounds.min, max: priceBounds.max };
  renderPriceFilter();
  renderWineList();
}

function renderWineList() {
  const list = document.getElementById('menuList');
  const allWines = wineList[wineActiveCategory];
  const wines = allWines.filter(w => { const p = Number(w.price); return p >= priceFilter.min && p <= priceFilter.max; });
  const countEl = document.getElementById('pfCount');
  if (countEl) {
    if (wines.length === allWines.length) {
      countEl.textContent = `${allWines.length} κρασιά σε αυτή την κατηγορία`;
    } else {
      countEl.textContent = `${wines.length} από ${allWines.length} κρασιά ταιριάζουν`;
    }
  }
  if (wines.length === 0) {
    list.innerHTML = `<div style="padding:40px 24px;text-align:center;color:var(--text-secondary);font-size:13px;font-style:italic">Κανένα κρασί σε αυτό το εύρος τιμής.<br><button onclick="resetPriceFilter()" style="margin-top:12px;background:none;border:1px solid var(--wine);color:var(--wine);padding:8px 16px;border-radius:20px;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:inherit">Καθαρισμός Φίλτρου</button></div>`;
    return;
  }
  list.innerHTML = wines.map(w => {
    const typeClass = 'type-' + w.type;
    const vBadge = w.vivino ? `<span style="font-size:11px;color:#A61D37;font-weight:500;margin-left:auto;white-space:nowrap">&#9733; ${w.vivino.rating.toFixed(1)}</span>` : '';
    return `<div class="wine-list-item ${selectedWineId === w.id ? 'selected' : ''}" onclick="selectWine('${w.id}')">
      <div style="display:flex;align-items:baseline;gap:6px"><div class="wl-name" style="flex:1">${w.name}</div>${vBadge}</div>
      <div class="wl-meta">${w.grape} &middot; ${w.vintage}</div>
      <div class="wl-bottom">
        <span class="wl-price">&euro; ${w.price}</span>
        <span class="wl-type ${typeClass}">${getTypeLabel(w.type)}</span>
      </div>
    </div>`;
  }).join('');
}

function selectWine(id) {
  selectedWineId = id;
  renderWineList();
  renderWineDetail(id);
}

function findWine(id) {
  for (const wines of Object.values(wineList)) {
    const found = wines.find(w => w.id === id);
    if (found) return found;
  }
  return null;
}

function renderVivinoCard(w) {
  if (!w.vivino) return '';
  const v = w.vivino;
  const fullStars = Math.floor(v.rating);
  const hasHalf = (v.rating - fullStars) >= 0.3;
  const emptyStars = 5 - fullStars - (hasHalf ? 1 : 0);
  const starFull = '<span class="star star-filled"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 0l2.5 5 5.5.8-4 3.9.9 5.3L8 12.4 3.1 15l.9-5.3-4-3.9L5.5 5z"/></svg></span>';
  const starHalf = '<span class="star star-half"><svg viewBox="0 0 16 16"><defs><linearGradient id="hg"><stop offset="50%" stop-color="#A61D37"/><stop offset="50%" stop-color="#DDD"/></linearGradient></defs><path fill="url(#hg)" d="M8 0l2.5 5 5.5.8-4 3.9.9 5.3L8 12.4 3.1 15l.9-5.3-4-3.9L5.5 5z"/></svg></span>';
  const starEmpty = '<span class="star star-empty"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 0l2.5 5 5.5.8-4 3.9.9 5.3L8 12.4 3.1 15l.9-5.3-4-3.9L5.5 5z"/></svg></span>';
  const starsHtml = starFull.repeat(fullStars) + (hasHalf ? starHalf : '') + starEmpty.repeat(emptyStars);
  const pctFill = (v.rating / 5 * 100).toFixed(0);
  const countFormatted = v.count >= 1000 ? (v.count / 1000).toFixed(1).replace(/\.0$/,'') + 'K' : v.count;

  return `<div class="vivino-card fade-in" style="animation-delay:0.15s">
    <div class="vivino-logo">
      <svg viewBox="0 0 24 24" fill="#A61D37"><circle cx="12" cy="5" r="3"/><circle cx="7" cy="13" r="3"/><circle cx="17" cy="13" r="3"/><circle cx="12" cy="21" r="3"/></svg>
      <span class="vl-text">Vivino</span>
    </div>
    <div>
      <div class="vivino-score">
        <span class="vs-number">${v.rating.toFixed(1)}</span>
        <span class="vs-max">/ 5</span>
      </div>
      <div class="vivino-stars">${starsHtml}</div>
    </div>
    <div class="vivino-info">
      <div class="vi-label">Αξιολόγηση Κοινότητας</div>
      <div class="vi-ratings">${countFormatted} αξιολογήσεις</div>
      <div class="vivino-bar-track"><div class="vivino-bar-fill" style="width:${pctFill}%"></div></div>
    </div>
  </div>`;
}

function renderWineDetail(id) {
  const panel = document.getElementById('pairingPanel');
  const w = findWine(id);
  if (!w) return;

  const pairsHtml = w.pairs ? w.pairs.map(p =>
    `<div class="pw-item">
      <div class="pw-dish">${p.dish}</div>
      <div class="pw-why">${p.why}</div>
      <div class="pw-price">${p.price}</div>
    </div>`
  ).join('') : '';

  panel.innerHTML = `<div class="wine-detail fade-in">
    <div class="wd-region-label">${w.region}</div>
    <div class="wd-name">${w.name}</div>
    <div class="wd-meta-row">
      <span class="wine-type-badge type-${w.type}">${getTypeLabel(w.type)}</span>
      <span class="wd-meta-item">${w.grape}</span>
      <span class="wd-meta-item">${w.vintage}</span>
    </div>
    <div class="wd-price-row">
      <span class="wd-price">&euro; ${w.price}</span>
      <span class="wd-format">${w.format}</span>
    </div>

    ${renderVivinoCard(w)}

    <div class="tasting-notes-grid fade-in" style="animation-delay:0.1s">
      <div class="tn-card">
        <div class="tn-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21a9 9 0 0 0 9-9c0-3.5-2-6.5-4-8.5C15 1.5 12 2 12 2s-3-.5-5 1.5C5 5.5 3 8.5 3 12a9 9 0 0 0 9 9z"/><path d="M12 2v10"/><path d="M8 6c2 1 4 1 4 1"/><path d="M16 6c-2 1-4 1-4 1"/></svg></div>
        <div class="tn-label">Άρωμα</div>
        <div class="tn-value">${w.nose}</div>
      </div>
      <div class="tn-card">
        <div class="tn-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2h8l-1.5 8c-.3 2-2 3.5-4.5 3.5S7.8 12 7.5 10L6 2z"/><path d="M12 13.5V20"/><path d="M8 22h8"/><path d="M6 6h12"/></svg></div>
        <div class="tn-label">Γεύση</div>
        <div class="tn-value">${w.palate}</div>
      </div>
      <div class="tn-card">
        <div class="tn-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 0-8 8c0 5.4 7 11 8 12 1-1 8-6.6 8-12a8 8 0 0 0-8-8z"/></svg></div>
        <div class="tn-label">Προέλευση</div>
        <div class="tn-value">${w.region}</div>
      </div>
    </div>

    <div class="tasting-section fade-in" style="animation-delay:0.2s">
      <div class="ts-label">Σχετικά με το Κρασί</div>
      <p>${w.desc}</p>
    </div>

    ${pairsHtml ? `
    <div class="pairs-well fade-in" style="animation-delay:0.3s">
      <div class="pw-label">Ταιριάζει Ιδανικά Με</div>
      ${pairsHtml}
    </div>` : ''}
  </div>`;
  panel.scrollTop = 0;
}

// ============================================================
// MODE SWITCHING
// ============================================================
let currentMode = 'pairing';

function setMode(mode) {
  currentMode = mode;
  document.getElementById('modePairing').classList.toggle('active', mode === 'pairing');
  document.getElementById('modeExplore').classList.toggle('active', mode === 'explore');
  document.getElementById('headerSubtitle').textContent = mode === 'pairing' ? 'Συνδυασμός Κρασιών' : 'Εξερεύνηση Κρασιών';

  // Reset selections
  const selBar = document.getElementById('selectionBar');
  if (selBar) selBar.remove();

  const panel = document.getElementById('pairingPanel');

  if (mode === 'pairing') {
    selectedDishes.clear();
    renderTabs();
    renderMenu();
    const pf = document.getElementById('priceFilter');
    if (pf) pf.innerHTML = '';
    panel.innerHTML = `<div class="empty-state">
      <svg class="glass-icon" viewBox="0 0 64 64" fill="none">
        <path d="M22 8h20l-3 24c-.5 4-4 7-8 7h-1c-4 0-7.5-3-8-7L22 8z" stroke="#5B3A4A" stroke-width="1.5"/>
        <path d="M32 39v14" stroke="#5B3A4A" stroke-width="1.5"/>
        <path d="M24 53h16" stroke="#5B3A4A" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M22 18h20" stroke="#5B3A4A" stroke-width="1" opacity="0.3"/>
      </svg>
      <h2>Επιλέξτε τα Πιάτα σας</h2>
      <p>Διαλέξτε ένα ή περισσότερα πιάτα από το μενού<br>για να ανακαλύψετε τον ιδανικό συνδυασμό από την κάβα μας</p>
    </div>`;
  } else {
    selectedWineId = null;
    renderWineExplorerTabs();
    renderPriceFilter();
    renderWineList();
    panel.innerHTML = `<div class="empty-state">
      <svg class="glass-icon" viewBox="0 0 64 64" fill="none">
        <path d="M22 8h20l-3 24c-.5 4-4 7-8 7h-1c-4 0-7.5-3-8-7L22 8z" stroke="#5B3A4A" stroke-width="1.5"/>
        <path d="M32 39v14" stroke="#5B3A4A" stroke-width="1.5"/>
        <path d="M24 53h16" stroke="#5B3A4A" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M22 18h20" stroke="#5B3A4A" stroke-width="1" opacity="0.3"/>
      </svg>
      <h2>Εξερευνήστε την Κάβα μας</h2>
      <p>Περιηγηθείτε στη βραβευμένη μας συλλογή<br>με σημειώσεις γευσιγνωσίας και προτάσεις συνδυασμού</p>
    </div>`;
  }
}

// INIT
renderTabs();
renderMenu();

// Splash screen
setTimeout(() => {
  document.getElementById('splash').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
}, 2200);

// Register service worker for offline PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
